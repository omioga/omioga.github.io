<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Política de privacitat de OM Ioga. Informació sobre la protecció de les teves dades personals." />
  <meta name="theme-color" content="#2A4130" />
  <title>Política de Privacitat | OM Ioga</title>

  <!-- Open Graph -->
  <meta property="og:title"       content="Política de Privacitat | OM Ioga" />
  <meta property="og:description" content="Informació sobre la protecció de les teves dades personals segons LOPD." />
  <meta property="og:type"        content="website" />
  <meta property="og:locale"      content="ca_ES" />

  <link rel="canonical" href="politica-privacitat.html" />
  <link rel="icon" type="image/png" href="assets/images/logo-fondo-blanc.png">
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <style>
    .legal-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 1rem;
    }
    
    .legal-section h2 {
      font-size: 2rem;
      color: #1a1a1a;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #c4a87e;
    }
    
    .legal-section h3 {
      font-size: 1.3rem;
      color: #2d2d2d;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    .legal-section p {
      line-height: 1.8;
      color: #555;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    
    .legal-section ul {
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .legal-section li {
      line-height: 1.8;
      color: #555;
      margin-bottom: 0.8rem;
    }
    
    .legal-contact {
      background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
      padding: 2rem;
      border-left: 4px solid #c4a87e;
      border-radius: 4px;
      margin: 2rem 0;
    }
    
    .legal-contact p {
      margin: 0.5rem 0;
    }
    
    .legal-update {
      background: #f0f0f0;
      padding: 1.5rem;
      border-radius: 4px;
      margin-top: 3rem;
      text-align: center;
      font-size: 0.95rem;
      color: #666;
    }
    
    .icon-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    
    .icon-item::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: #c4a87e;
      color: white;
      border-radius: 50%;
      margin-right: 1rem;
      flex-shrink: 0;
      font-weight: bold;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="page-transition" aria-hidden="true"></div>
  <nav id="nav" role="navigation" aria-label="Navegació principal">
    <div class="container nav-inner">
      <a id="nav-logo" class="nav-logo" href="index.html" aria-label="OM Ioga - Inici"><img src="assets/images/omioga-logo.png" alt="OM Ioga"></a>
      <ul id="nav-menu" class="nav-menu" role="menubar"></ul>
      <button id="nav-toggle" class="nav-toggle" aria-label="Obrir menú" aria-expanded="false" aria-controls="nav-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <main id="main" role="main"></main>
  <footer id="footer" role="contentinfo"></footer>
  <script src="js/main.js"></script>
</body>
</html>
